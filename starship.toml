[line_break]
disabled = false

[username]
show_always = true
style_user = "bg:#141417 fg:#E7E7EA"
style_root = "bg:#141417 fg:#FF6B6B"
format = '[ $user ]($style)'
disabled = false

# If you later want an Apple glyph here:
# format = '[ Ô£Ņ $user ]($style)'

[directory]
style = "bg:#1C1D21 fg:#E7E7EA"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
