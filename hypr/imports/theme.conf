# --- macOS-ish / "Tahoe" vibe: soft, minimal, glassy ---

general {
    # A little more breathing room than 1px; macOS feels padded
    gaps_in = 2
    gaps_out = 2

    # Subtle borders (macOS doesn't scream borders)
    border_size = 2

    # Active: cool macOS blue with a gentle gradient
    col.active_border = rgba(6CB6FFFF) rgba(AAD7FFFF) 45deg

    # Inactive: neutral, low contrast
    col.inactive_border = rgba(3A3A3A66) rgba(2A2A2A44) 45deg

    layout = dwindle
    resize_on_border = true
}

group {
    # Keep group borders consistent with windows
    col.border_active = rgba(6CB6FFFF) rgba(AAD7FFFF) 45deg
    col.border_inactive = rgba(3A3A3A66) rgba(2A2A2A44) 45deg
    col.border_locked_active = rgba(6CB6FFFF) rgba(AAD7FFFF) 45deg
    col.border_locked_inactive = rgba(3A3A3A66) rgba(2A2A2A44) 45deg
}

decoration {
    # This is where the macOS feel really comes from
    rounding = 2

    # Slightly “glassy” look (especially nice with transparent apps)
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }

    # Soft shadow like macOS
    #drop_shadow = true
    #shadow_range = 22
    #shadow_render_power = 3
    #col.shadow = rgba(00000055)
}

# Optional but recommended: make movement feel more "mac-like"
animations {
    enabled = true

    # smooth but not bouncy
    bezier = macEase, 0.25, 0.10, 0.25, 1.0
    animation = windows, 1, 5, macEase
    animation = border, 1, 6, macEase
    animation = fade, 1, 4, macEase
    animation = workspaces, 1, 4, macEase
}

# Optional: small quality-of-life touches
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}
