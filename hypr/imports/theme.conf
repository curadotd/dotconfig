# --- macOS Tahoe / liquid glass: soft, minimal, glassy ---

# GTK theme, icons and fonts (MacTahoe themes installed by install_mactahoe_theme)
exec = gsettings set org.gnome.desktop.interface gtk-theme 'MacTahoe-Dark-nord'
exec = gsettings set org.gnome.desktop.interface icon-theme 'MacTahoe-nord-dark'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec = gsettings set org.gnome.desktop.interface font-name 'SF Pro Text 11'
exec = gsettings set org.gnome.desktop.interface document-font-name 'SF Pro Text 11'
exec = gsettings set org.gnome.desktop.interface monospace-font-name 'FiraCode Nerd Font Mono 10'
exec = gsettings set org.gnome.desktop.interface font-antialiasing 'rgba'
exec = gsettings set org.gnome.desktop.interface font-hinting 'full'

general {
    # A little more breathing room than 1px; macOS feels padded
    gaps_in = 4
    gaps_out = 8

    # Subtle borders (macOS doesn't scream borders)
    border_size = 1

    # Active: cool macOS blue with a gentle gradient
    col.active_border = rgba(6CB6FFFF) rgba(AAD7FFFF) 45deg

    # Inactive: neutral, low contrast
    col.inactive_border = rgba(3A3A3A66) rgba(2A2A2A44) 45deg

    layout = dwindle
    resize_on_border = true
}

group {
    # Keep group borders consistent with windows
    col.border_active = rgba(6CB6FFFF) rgba(AAD7FFFF) 45deg
    col.border_inactive = rgba(3A3A3A66) rgba(2A2A2A44) 45deg
    col.border_locked_active = rgba(6CB6FFFF) rgba(AAD7FFFF) 45deg
    col.border_locked_inactive = rgba(3A3A3A66) rgba(2A2A2A44) 45deg
}

decoration {
    # Tahoe is round: this is where the liquid glass feel comes from
    rounding = 12

    # Glassy blur behind translucent surfaces
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        special = true
    }

    # Soft macOS-like shadow (Hyprland >= 0.42 syntax)
    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(00000055)
    }

    dim_special = 0.3
}

# Blur the shell surfaces so bars and menus read as glass
# (Hyprland 0.53+ unified rule syntax, ignore_alpha 0 == old ignorezero)
layerrule = match:namespace ^(waybar)$, blur on
layerrule = match:namespace ^(waybar)$, ignore_alpha 0
layerrule = match:namespace ^(rofi)$, blur on
layerrule = match:namespace ^(rofi)$, ignore_alpha 0
layerrule = match:namespace ^(dunst)$, blur on
layerrule = match:namespace ^(dunst)$, ignore_alpha 0
layerrule = match:namespace ^(notifications)$, blur on
layerrule = match:namespace ^(notifications)$, ignore_alpha 0
