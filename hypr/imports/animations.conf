# macOS-like animations: smooth but not bouncy
# See https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = yes

    bezier = macEase, 0.25, 0.10, 0.25, 1.0
    bezier = winOut, 0.3, -0.3, 0, 1

    animation = windows, 1, 5, macEase, slide
    animation = windowsIn, 1, 5, macEase, popin 90%
    animation = windowsOut, 1, 4, winOut, slide
    animation = windowsMove, 1, 4, macEase, slide
    animation = border, 1, 6, macEase
    animation = fade, 1, 4, macEase
    animation = workspaces, 1, 4, macEase, slide
    animation = specialWorkspace, 1, 4, macEase, slidevert
}
