background {
    monitor =
    path = /mnt/repository/desktops/desktop01.png  # only png supported for now
    color = rgba(25, 20, 20, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 4 # 0 disables blurring
    blur_size = 2
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgb(000000)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    position = 0, -220
    halign = center
    valign = center
}

# Power buttons (macOS Tahoe styled)
# Note: hyprlock doesn't support clickable buttons, but these provide visual buttons
# For actual functionality, unlock first then use hyprshutdown or systemctl commands

label {
    monitor =
    text = 󰜉  Restart
    color = rgba(255, 210, 122, 0.9)
    font_size = 16
    font_family = SF Pro Text
    
    position = -120, -600
    onclick = $HOME/.config/hypr/scripts/restart
    halign = center
    valign = center
}

label {
    monitor =
    text = 󰐥  Shutdown
    color = rgba(255, 107, 107, 0.9)
    font_size = 16
    font_family = SF Pro Text
    
    position = 120, -600
    onclick = $HOME/.config/hypr/scripts/shutdown
    halign = center
    valign = center
}
