# macOS Tahoe styled lock screen

background {
    monitor =
    path = /mnt/repository/desktops/desktop01.png
    color = rgba(20, 20, 22, 1.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 4
    blur_size = 2
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Big thin clock, like the macOS lock screen
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(235, 235, 245, 0.92)
    font_size = 96
    font_family = SF Pro Display Thin
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(235, 235, 245, 0.72)
    font_size = 20
    font_family = SF Pro Text
    position = 0, 210
    halign = center
    valign = center
}

# Glass password pill
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 1
    rounding = 25
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.14)
    inner_color = rgba(30, 30, 34, 0.6)
    font_color = rgba(235, 235, 245, 0.92)
    font_family = SF Pro Text
    fade_on_empty = true
    placeholder_text = <i>Enter Password</i>
    hide_input = false
    position = 0, -220
    halign = center
    valign = center
}

# Power buttons (visual + clickable on recent hyprlock)
label {
    monitor =
    text = 󰜉  Restart
    color = rgba(255, 210, 122, 0.9)
    font_size = 16
    font_family = SF Pro Text

    position = -120, -600
    onclick = $HOME/.config/hypr/scripts/restart
    halign = center
    valign = center
}

label {
    monitor =
    text = 󰐥  Shutdown
    color = rgba(255, 107, 107, 0.9)
    font_size = 16
    font_family = SF Pro Text

    position = 120, -600
    onclick = $HOME/.config/hypr/scripts/shutdown
    halign = center
    valign = center
}
