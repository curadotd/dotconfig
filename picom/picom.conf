# picom — macOS Tahoe liquid glass for DWM (X11)
# Built for the FT-Labs picom fork (animations); vanilla picom >= 10 ignores
# the animation options with a warning.

#################################
#          Backend              #
#################################
backend = "glx";
vsync = true;
glx-no-stencil = true;
use-damage = true;

#################################
#          Corners              #
#################################
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'dwm'"
];

#################################
#          Shadows              #
#################################
shadow = true;
shadow-radius = 22;
shadow-opacity = 0.35;
shadow-offset-x = -18;
shadow-offset-y = -14;
shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slstatus'"
];

#################################
#          Blur                 #
#################################
blur: {
  method = "dual_kawase";
  strength = 6;
  background = false;
  background-frame = false;
  background-fixed = false;
}
blur-background-exclude = [
  "window_type = 'desktop'",
  "class_g = 'slop'"
];

#################################
#          Opacity              #
#################################
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;

opacity-rule = [
  "88:class_g = 'kitty'",
  "90:class_g = 'thunar'",
  "90:class_g = 'Rofi'"
];

#################################
#          Fading               #
#################################
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 6;

#################################
#          Animations           #
#################################
# FT-Labs picom fork options — smooth, not bouncy (macOS feel)
animations = true;
animation-stiffness-in-tag = 220;
animation-stiffness-tag-change = 120;
animation-window-mass = 0.6;
animation-dampening = 18;
animation-clamping = true;
animation-for-open-window = "zoom";
animation-for-unmap-window = "squeeze";
animation-for-transient-window = "slide-up";

#################################
#          Wintypes             #
#################################
wintypes: {
  tooltip = { fade = true; shadow = false; opacity = 0.92; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.92; shadow = false; };
  dropdown_menu = { opacity = 0.92; shadow = false; };
};
