# --- Font (macOS-like) ---
font_family SF Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11

# macOS-like rhythm
adjust_line_height 2
adjust_column_width 0

# Nerd glyph fallback (icons, powerline, etc.)
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD FiraCode Nerd Font Mono

# --- Spacing / sheet feel ---
window_padding_width 12
window_padding_height 10

# Colors
include themes/theme.conf

# Glass
background_opacity 0.88

# No titlebar
hide_window_decorations yes
confirm_os_window_close 0

# QoL
enable_audio_bell no
cursor_blink_interval 0.6
mouse_hide_wait 2.0
